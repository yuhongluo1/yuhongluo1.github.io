<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Write — Yuhong Luo</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
    background: #0d0d0d;
    color: #e0e0e0;
    line-height: 1.7;
    padding: 3rem 2rem;
    max-width: 700px;
    margin: 0 auto;
  }
  h1 { font-size: 1.6rem; margin-bottom: .3rem; }
  .subtitle { color: #666; font-size: .9rem; margin-bottom: 2rem; }
  label { display: block; color: #999; font-size: .85rem; margin-bottom: .3rem; margin-top: 1.2rem; }
  input, select, textarea {
    width: 100%;
    background: #141414;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e0e0e0;
    padding: .8rem 1rem;
    font-size: 1rem;
    font-family: inherit;
  }
  textarea { min-height: 250px; resize: vertical; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #6c8cff; }
  .btn {
    display: inline-block;
    padding: .8rem 2rem;
    background: #6c8cff;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 1.2rem;
    transition: background .2s;
  }
  .btn:hover { background: #5a7ae8; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .status { margin-top: 1rem; padding: .8rem; border-radius: 8px; display: none; }
  .status.success { display:block; background: #1a3a1a; border: 1px solid #2a5a2a; color: #8f8; }
  .status.error { display:block; background: #3a1a1a; border: 1px solid #5a2a2a; color: #f88; }
  .status.loading { display:block; background: #1a1a3a; border: 1px solid #2a2a5a; color: #88f; }
  .hint { color: #555; font-size: .8rem; margin-top: .3rem; }
  hr { border: none; border-top: 1px solid #222; margin: 2rem 0; }
</style>
</head>
<body>

<h1>✏️ Write</h1>
<p class="subtitle">Write something and it'll appear on your site in a few minutes.</p>

<label for="title">Title</label>
<input type="text" id="title" placeholder="e.g. A random thought">

<label for="section">Section</label>
<select id="section">
  <option value="writing">Writing — essays, thoughts, notes</option>
  <option value="personal">Personal — for yourself</option>
</select>

<label for="content">Write something...</label>
<textarea id="content" placeholder="Start typing..."></textarea>

<button class="btn" id="submitBtn" onclick="submit()">📝 Publish</button>
<div id="status" class="status"></div>

<hr>

<div style="text-align:center;color:#444;font-size:.85rem;">
  <a href="https://yuhongluo1.github.io" style="color:#555;">← Back to site</a>
</div>

<script>
// GitHub username and repo
const GITHUB_USER = 'yuhongluo1';
const GITHUB_REPO = 'yuhongluo1.github.io';
const BRANCH = 'main';

async function getToken() {
  let token = localStorage.getItem('gh_token');
  if (!token) {
    token = prompt('Enter your GitHub token (one time only, saved locally):');
    if (token) {
      localStorage.setItem('gh_token', token);
    }
  }
  return token;
}

async function submit() {
  const title = document.getElementById('title').value.trim();
  const content = document.getElementById('content').value.trim();
  const section = document.getElementById('section').value;
  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('status');

  if (!title || !content) {
    status.className = 'status error';
    status.textContent = '❌ Please enter both a title and content.';
    return;
  }

  const token = await getToken();
  if (!token) {
    status.className = 'status error';
    status.textContent = '❌ No token provided.';
    return;
  }

  btn.disabled = true;
  status.className = 'status loading';
  status.textContent = '⏳ Publishing...';

  const date = new Date();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dateStr = months[date.getMonth()] + ' ' + date.getFullYear();

  // Build the post HTML
  const postHtml = `
    <div class="blog-post">
      <span class="date">${dateStr}</span>
      <details>
        <summary style="cursor:pointer;list-style:none;">
          <h3 style="display:inline;">${escapeHtml(title)}</h3>
        </summary>
        <div class="content">
          <p>${escapeHtml(content).replace(/\n/g, '</p><p>')}</p>
        </div>
      </details>
    </div>`;

  // Get current file
  const fileUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/index.html`;
  
  try {
    // Get current file content and SHA
    const getResp = await fetch(fileUrl, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    
    if (!getResp.ok) {
      throw new Error('Failed to fetch current page: ' + getResp.status);
    }
    
    const fileData = await getResp.json();
    const sha = fileData.sha;
    let currentContent = atob(fileData.content);

    // Find the right section and insert the post
    let insertPoint;
    if (section === 'personal') {
      insertPoint = currentContent.lastIndexOf('</section>');
      // Insert before the last </section> (which is the Contact section)
      // Actually, find the personal section or writing section
      const sectionId = `id="${section}"`;
      const sectionStart = currentContent.indexOf(sectionId);
      if (sectionStart > -1) {
        const blogListEnd = currentContent.indexOf('</div>', currentContent.indexOf('blog-list', sectionStart));
        const nextSection = currentContent.indexOf('</section>', sectionStart);
        if (nextSection > 0) {
          currentContent = currentContent.slice(0, nextSection) + '\n' + postHtml + '\n  ' + currentContent.slice(nextSection);
        }
      }
    } else {
      // writing section - find it and insert before the closing </section>
      const sectionStart = currentContent.indexOf('id="writing"');
      if (sectionStart > -1) {
        const nextSection = currentContent.indexOf('</section>', sectionStart);
        if (nextSection > 0) {
          currentContent = currentContent.slice(0, nextSection) + '\n' + postHtml + '\n  ' + currentContent.slice(nextSection);
        }
      }
    }

    // Commit
    const commitResp = await fetch(fileUrl, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json'
      },
      body: JSON.stringify({
        message: `✏️ New post: ${title}`,
        content: btoa(unescape(encodeURIComponent(currentContent))),
        sha: sha,
        branch: BRANCH
      })
    });

    if (!commitResp.ok) {
      const err = await commitResp.json();
      throw new Error(err.message || 'Failed to publish');
    }

    status.className = 'status success';
    status.innerHTML = `✅ Published! <a href="https://yuhongluo1.github.io" style="color:#6c8cff;">View site →</a> (may take 1-2 min to update)`;
    
    // Clear form
    document.getElementById('title').value = '';
    document.getElementById('content').value = '';

  } catch (err) {
    status.className = 'status error';
    status.textContent = '❌ ' + err.message;
  }

  btn.disabled = false;
}

function escapeHtml(text) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, c => map[c]);
}

// Clear stored token (for security)
document.getElementById('clearToken') || document.body.appendChild(
  Object.assign(document.createElement('button'), {
    className: 'btn btn-secondary',
    id: 'clearToken',
    style: 'background:#222;color:#888;margin-top:.5rem;cursor:pointer;border:none;padding:.5rem 1rem;border-radius:8px;font-size:.8rem;',
    textContent: '🔑 Clear saved token',
    onclick: () => { localStorage.removeItem('gh_token'); alert('Token cleared!'); }
  })
);
</script>
</body>
</html>
