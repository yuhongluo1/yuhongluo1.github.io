<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Write — Yuhong Luo</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
    background: #0d0d0d;
    color: #e0e0e0;
    line-height: 1.7;
    padding: 2rem;
    min-height: 100vh;
  }
  .container { max-width: 800px; margin: 0 auto; }

  /* ─── Header ─── */
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:.3rem; flex-wrap:wrap; gap:.5rem; }
  .header h1 { font-size:1.4rem; }
  .header .subtitle { color:#666; font-size:.85rem; }
  .header-right { display:flex; gap:.6rem; align-items:center; }
  .count { color:#555; font-size:.8rem; }

  /* ─── Form ─── */
  .form-section { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1rem; }
  .form-group { flex:1; min-width:200px; }
  .form-group label { display:block; color:#999; font-size:.8rem; margin-bottom:.25rem; }
  .form-group input, .form-group select {
    width:100%; background:#141414; border:1px solid #333; border-radius:6px;
    color:#e0e0e0; padding:.6rem .8rem; font-size:.9rem; font-family:inherit;
  }
  .form-group input:focus, .form-group select:focus { outline:none; border-color:#6c8cff; }

  /* ─── Toolbar ─── */
  .toolbar {
    display:flex; gap:2px; padding:.4rem .6rem;
    background:#141414; border:1px solid #333; border-bottom:none;
    border-radius:8px 8px 0 0; flex-wrap:wrap;
  }
  .toolbar button {
    background:none; border:none; color:#888; cursor:pointer;
    padding:.25rem .55rem; border-radius:4px; font-size:.85rem; transition:all .15s;
  }
  .toolbar button:hover { background:#222; color:#eee; }
  .toolbar .sep { width:1px; background:#333; margin:.25rem .3rem; }

  /* ─── Editor + Preview ─── */
  .editor-wrap { border:1px solid #333; border-radius:0 0 8px 8px; overflow:hidden; }
  .editor-wrap textarea {
    width:100%; min-height:280px; padding:.8rem 1rem;
    background:#0d0d0d; color:#e0e0e0; border:none;
    font-size:.95rem; font-family:inherit; line-height:1.8; resize:vertical;
  }
  .editor-wrap textarea:focus { outline:none; }

  .preview-wrap {
    border:1px solid #333; border-radius:8px; margin-top:1rem; padding:1rem 1.2rem;
    background:#141414; display:none;
  }
  .preview-wrap.visible { display:block; }
  .preview-wrap .preview-label { color:#555; font-size:.75rem; text-transform:uppercase; letter-spacing:.5px; margin-bottom:.5rem; }
  .preview-content { color:#bbb; font-size:.9rem; line-height:1.8; }
  .preview-content h1 { font-size:1.2rem; color:#eee; margin:.5rem 0; }
  .preview-content h2 { font-size:1.05rem; color:#ddd; margin:.4rem 0; }
  .preview-content strong { color:#ddd; }
  .preview-content em { color:#aaa; }
  .preview-content p { margin:.3rem 0; }

  /* ─── Buttons ─── */
  .actions { display:flex; gap:.5rem; margin-top:1rem; flex-wrap:wrap; }
  .btn {
    padding:.65rem 1.5rem; border:none; border-radius:8px;
    font-size:.9rem; font-weight:600; cursor:pointer; transition:all .2s;
  }
  .btn-primary { background:#6c8cff; color:#fff; }
  .btn-primary:hover { background:#5a7ae8; }
  .btn-primary:disabled { opacity:.4; cursor:not-allowed; }
  .btn-secondary { background:#222; color:#aaa; }
  .btn-secondary:hover { background:#333; color:#ddd; }
  .btn-danger { background:#2a1a1a; color:#f88; }
  .btn-danger:hover { background:#3a1a1a; }

  .status { margin-top:.8rem; padding:.7rem 1rem; border-radius:8px; display:none; font-size:.9rem; }
  .status.success { display:block; background:#1a3a1a; border:1px solid #2a5a2a; color:#8f8; }
  .status.error { display:block; background:#3a1a1a; border:1px solid #5a2a2a; color:#f88; }
  .status.loading { display:block; background:#1a1a3a; border:1px solid #2a2a5a; color:#88f; }
  .status.info { display:block; background:#1a1a1a; border:1px solid #333; color:#aaa; }

  .footer-links { text-align:center; color:#444; font-size:.8rem; margin-top:2rem; padding-top:1.5rem; border-top:1px solid #181818; }
  .footer-links a { color:#555; }
  .footer-links a:hover { color:#6c8cff; }

  @media (max-width:600px) {
    body { padding:1rem; }
    .toolbar button { padding:.2rem .4rem; font-size:.8rem; }
  }
</style>
</head>
<body>
<div class="container">

<!-- ─── Header ─── -->
<div class="header">
  <div>
    <h1>✏️ Write</h1>
    <div class="subtitle">Publish to <a href="https://yuhongluo1.github.io" style="color:#6c8cff;">yuhongluo1.github.io</a></div>
  </div>
  <div class="header-right">
    <span class="count" id="wordCount">0 words</span>
    <span class="count">·</span>
    <span class="count" id="charCount">0 chars</span>
  </div>
</div>

<!-- ─── Form ─── -->
<div class="form-section">
  <div class="form-group" style="flex:2;">
    <label for="title">Title</label>
    <input type="text" id="title" placeholder="Post title..." oninput="autoSave()">
  </div>
  <div class="form-group">
    <label for="section">Section</label>
    <select id="section" onchange="autoSave()">
      <option value="writing">📝 Writing</option>
      <option value="personal">💭 Personal</option>
    </select>
  </div>
  <div class="form-group">
    <label for="position">Position</label>
    <select id="position">
      <option value="top">Top (newest first)</option>
      <option value="bottom">Bottom</option>
    </select>
  </div>
</div>

<!-- ─── Toolbar ─── -->
<div class="toolbar">
  <button onclick="wrapText('**','**')" title="Bold"><strong>B</strong></button>
  <button onclick="wrapText('*','*')" title="Italic"><em>I</em></button>
  <button onclick="wrapText('[','](url)')" title="Link">🔗</button>
  <div class="sep"></div>
  <button onclick="insertBefore('\n## ')">H2</button>
  <button onclick="insertBefore('\n### ')">H3</button>
  <div class="sep"></div>
  <button onclick="insertBefore('\n> ')" title="Quote">❝</button>
  <button onclick="insertBefore('\n- ')" title="List">•</button>
  <button onclick="insertBefore('\n---\n')" title="Divider">—</button>
  <div class="sep"></div>
  <button onclick="togglePreview()" id="previewBtn">👁 Preview</button>
  <button onclick="clearAll()" title="Clear">🗑</button>
</div>

<!-- ─── Editor ─── -->
<div class="editor-wrap">
  <textarea id="content" placeholder="Start writing... Markdown supported: **bold**, *italic*, [links](url), ## headings" oninput="updateCounts(); autoSave();"></textarea>
</div>

<!-- ─── Preview ─── -->
<div class="preview-wrap" id="preview">
  <div class="preview-label">Preview</div>
  <div class="preview-content" id="previewContent"></div>
</div>

<!-- ─── Actions ─── -->
<div class="actions">
  <button class="btn btn-primary" id="publishBtn" onclick="publish()">📝 Publish</button>
  <button class="btn btn-secondary" onclick="saveDraft()">💾 Save draft</button>
  <button class="btn btn-secondary" id="showDraftsBtn" onclick="showDrafts()">📂 Drafts</button>
  <button class="btn btn-danger" onclick="clearAll()">🗑 Clear</button>
</div>
<div id="status" class="status"></div>

<!-- ─── Drafts Panel ─── -->
<div class="preview-wrap" id="draftsPanel">
  <div class="preview-label">Saved Drafts</div>
  <div id="draftsList"></div>
</div>

<div class="footer-links">
  <a href="https://yuhongluo1.github.io">← Back to site</a>
  · <a href="#" onclick="clearToken();return false;">Clear saved token</a>
  · <span id="lastSaved"></span>
</div>
</div>

<script>
const GITHUB_USER = 'yuhongluo1';
const GITHUB_REPO = 'yuhongluo1.github.io';
const BRANCH = 'main';
const DRAFT_KEY = 'yh_write_draft';
const DRAFTS_LIST_KEY = 'yh_drafts_list';
const TOKEN_KEY = 'yh_gh_token';

// ─── Counts ───
function updateCounts() {
  const t = document.getElementById('content').value;
  const words = t.trim() ? t.trim().split(/\s+/).length : 0;
  document.getElementById('wordCount').textContent = words + ' word' + (words!==1?'s':'');
  document.getElementById('charCount').textContent = t.length + ' chars';
}

// ─── Toolbar ───
function wrapText(before, after) {
  const ta = document.getElementById('content');
  const start = ta.selectionStart, end = ta.selectionEnd;
  const text = ta.value;
  ta.value = text.slice(0, start) + before + text.slice(start, end) + after + text.slice(end);
  ta.focus();
  ta.selectionStart = start + before.length;
  ta.selectionEnd = end + before.length;
  updateCounts(); autoSave();
}

function insertBefore(text) {
  const ta = document.getElementById('content');
  const start = ta.selectionStart;
  const before = ta.value.slice(0, start);
  const after = ta.value.slice(start);
  // Insert at line start
  const lineStart = before.lastIndexOf('\n') + 1;
  ta.value = before.slice(0, lineStart) + text + before.slice(lineStart) + after;
  ta.focus();
  ta.selectionStart = ta.selectionEnd = lineStart + text.length;
  updateCounts(); autoSave();
}

// ─── Preview ───
let previewVisible = false;
function togglePreview() {
  previewVisible = !previewVisible;
  document.getElementById('preview').classList.toggle('visible', previewVisible);
  document.getElementById('previewBtn').textContent = previewVisible ? '✏️ Editor' : '👁 Preview';
  if (previewVisible) updatePreview();
}
function updatePreview() {
  if (!previewVisible) return;
  const md = document.getElementById('content').value;
  let html = md
    .replace(/### (.+)/g, '<h3>$1</h3>')
    .replace(/## (.+)/g, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" style="color:#6c8cff;">$1</a>')
    .replace(/^> (.+)/gm, '<blockquote style="border-left:3px solid #444;padding-left:.8rem;color:#888;">$1</blockquote>')
    .replace(/^- (.+)/gm, '• $1<br>')
    .replace(/\n---\n/g, '<hr style="border:none;border-top:1px solid #333;margin:1rem 0;">')
    .split('\n\n').filter(b => b.trim()).map(b => {
      if (b.startsWith('<h') || b.startsWith('<blockquote') || b.startsWith('•') || b.startsWith('<hr')) return b;
      return '<p>' + b.replace(/\n/g, '<br>') + '</p>';
    }).join('\n');
  document.getElementById('previewContent').innerHTML = html;
}

// ─── Auto-save draft ───
function autoSave() {
  const draft = {
    title: document.getElementById('title').value,
    section: document.getElementById('section').value,
    content: document.getElementById('content').value,
    saved: new Date().toISOString()
  };
  localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
  document.getElementById('lastSaved').textContent = 'Draft auto-saved';
}

// ─── Save/Load Drafts ───
function saveDraft() {
  const title = document.getElementById('title').value || 'Untitled';
  const content = document.getElementById('content').value;
  if (!content) { showStatus('Nothing to save.', 'info'); return; }
  
  let drafts = JSON.parse(localStorage.getItem(DRAFTS_LIST_KEY) || '[]');
  drafts.unshift({
    title, section: document.getElementById('section').value,
    content, saved: new Date().toISOString()
  });
  if (drafts.length > 10) drafts = drafts.slice(0, 10);
  localStorage.setItem(DRAFTS_LIST_KEY, JSON.stringify(drafts));
  showStatus('✅ Draft saved!', 'success');
}

function showDrafts() {
  const panel = document.getElementById('draftsPanel');
  const list = document.getElementById('draftsList');
  const drafts = JSON.parse(localStorage.getItem(DRAFTS_LIST_KEY) || '[]');
  
  if (drafts.length === 0) {
    list.innerHTML = '<p style="color:#555;font-style:italic;">No saved drafts.</p>';
  } else {
    list.innerHTML = drafts.map((d, i) => `
      <div style="background:#0d0d0d;border:1px solid #222;border-radius:6px;padding:.6rem .8rem;margin-bottom:.4rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;"
           onclick="loadDraft(${i})">
        <div>
          <strong style="color:#ccc;font-size:.85rem;">${d.title}</strong>
          <span style="color:#555;font-size:.75rem;margin-left:.5rem;">${new Date(d.saved).toLocaleString()}</span>
        </div>
        <span style="color:#6c8cff;font-size:.75rem;">Load</span>
      </div>
    `).join('');
  }
  panel.classList.toggle('visible');
}

function loadDraft(idx) {
  const drafts = JSON.parse(localStorage.getItem(DRAFTS_LIST_KEY) || '[]');
  if (!drafts[idx]) return;
  const d = drafts[idx];
  document.getElementById('title').value = d.title;
  document.getElementById('section').value = d.section;
  document.getElementById('content').value = d.content;
  updateCounts(); autoSave(); updatePreview();
  document.getElementById('draftsPanel').classList.remove('visible');
  showStatus('📂 Draft loaded!', 'info');
}

// ─── Clear ───
function clearAll() {
  if (!confirm('Clear everything? Unsaved changes will be lost.')) return;
  document.getElementById('title').value = '';
  document.getElementById('content').value = '';
  document.getElementById('status').className = 'status';
  updateCounts();
  localStorage.removeItem(DRAFT_KEY);
  showStatus('Cleared.', 'info');
}

// ─── Token ───
function getToken() {
  let token = localStorage.getItem(TOKEN_KEY);
  if (!token) {
    token = prompt('Enter your GitHub token (one time only):\nhttps://github.com/settings/tokens');
    if (token) localStorage.setItem(TOKEN_KEY, token);
  }
  return token;
}
function clearToken() {
  localStorage.removeItem(TOKEN_KEY);
  alert('Token cleared!');
}

// ─── Publish ───
async function publish() {
  const title = document.getElementById('title').value.trim();
  const content = document.getElementById('content').value.trim();
  const section = document.getElementById('section').value;
  const position = document.getElementById('position').value;
  const btn = document.getElementById('publishBtn');

  if (!title || !content) {
    showStatus('❌ Please enter a title and content.', 'error');
    return;
  }

  const token = getToken();
  if (!token) { showStatus('❌ No GitHub token.', 'error'); return; }

  btn.disabled = true;
  showStatus('⏳ Publishing...', 'loading');

  const date = new Date();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dateStr = months[date.getMonth()] + ' ' + date.getFullYear();

  // Build post HTML
  const bodyHtml = content
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>')
    .split('\n\n').filter(b => b.trim()).map(b => '<p>' + b.replace(/\n/g, '<br>') + '</p>').join('\n');

  const postHtml = `
    <div class="blog-post">
      <span class="date">${dateStr}</span>
      <details>
        <summary style="cursor:pointer;list-style:none;">
          <h3 style="display:inline;">${escapeHtml(title)}</h3>
        </summary>
        <div class="content">
          ${bodyHtml}
        </div>
      </details>
    </div>`;

  try {
    // Get current file
    const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/index.html`;
    const getResp = await fetch(url, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!getResp.ok) throw new Error('Failed to fetch page (' + getResp.status + ')');
    
    const fileData = await getResp.json();
    let current = decodeUTF8(fileData.content);

    // Find section and insert
    const sectionMarker = `id="${section}"`;
    const secIdx = current.indexOf(sectionMarker);
    if (secIdx === -1) throw new Error(`Section "${section}" not found`);

    const closeIdx = current.indexOf('</section>', secIdx);
    if (closeIdx === -1) throw new Error('Could not find section end');

    if (position === 'top') {
      // Insert right after the first blog-post or the opening div
      const firstPost = current.indexOf('<div class="blog-post"', secIdx);
      if (firstPost > -1 && firstPost < closeIdx) {
        current = current.slice(0, firstPost) + postHtml + '\n' + current.slice(firstPost);
      } else {
        current = current.slice(0, closeIdx) + postHtml + '\n  ' + current.slice(closeIdx);
      }
    } else {
      current = current.slice(0, closeIdx) + postHtml + '\n  ' + current.slice(closeIdx);
    }

    // Commit
    const commitResp = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json'
      },
      body: JSON.stringify({
        message: `✏️ ${title}`,
        content: btoa(encodeUTF8(current)),
        sha: fileData.sha,
        branch: BRANCH
      })
    });

    if (!commitResp.ok) {
      const err = await commitResp.json();
      throw new Error(err.message || 'Publish failed');
    }

    showStatus(`✅ Published! <a href="https://yuhongluo1.github.io" style="color:#6c8cff;">View site →</a>`, 'success');
    document.getElementById('title').value = '';
    document.getElementById('content').value = '';
    updateCounts();
    localStorage.removeItem(DRAFT_KEY);

  } catch (err) {
    showStatus('❌ ' + err.message, 'error');
  }

  btn.disabled = false;
}

// ─── Helpers ───
function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = msg;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function encodeUTF8(s) {
  return unescape(encodeURIComponent(s));
}
function decodeUTF8(s) {
  try { return decodeURIComponent(escape(atob(s))); }
  catch(e) { return atob(s); }
}

// ─── Restore draft on load ───
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(DRAFT_KEY);
  if (saved) {
    try {
      const d = JSON.parse(saved);
      if (d.content) {
        document.getElementById('title').value = d.title || '';
        document.getElementById('section').value = d.section || 'writing';
        document.getElementById('content').value = d.content;
        updateCounts();
        document.getElementById('lastSaved').textContent = 'Draft restored';
      }
    } catch(e) {}
  }
  updateCounts();
});

// Keyboard shortcut: Ctrl+Enter to publish
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    publish();
  }
});
</script>
</body>
</html>
